# ══════════════════════════════════════════════════════════════════
# HammaBop — Nginx konfiguratsiyasi (Contabo VPS)
# /etc/nginx/sites-available/hammabop.conf
# Simlink: ln -s /etc/nginx/sites-available/hammabop.conf /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════════════

# ─── Rate limiting zonalari ───────────────────────────────────────
# IP bo'yicha: sekundiga 5 so'rov (burst 20 gacha)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

# Login sahifasi uchun qattiqroq: minutiga 10 urinish
limit_req_zone $binary_remote_addr zone=login_limit:1m rate=10r/m;

# Upload uchun: minutiga 20 urinish
limit_req_zone $binary_remote_addr zone=upload_limit:5m rate=20r/m;

# ─── DDoS himoya: IP ulanish soni ────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── Yomon botlarni bloklash ──────────────────────────────────────
map $http_user_agent $is_bad_bot {
    default         0;
    ~*masscan        1;
    ~*sqlmap         1;
    ~*nikto          1;
    ~*nmap           1;
    ~*zgrab          1;
    ~*(curl|wget)    0;   # API uchun ruxsat
    ""               1;   # Bo'sh user-agent — blok
}

# ─── HTTP → HTTPS yo'naltirish ────────────────────────────────────
server {
    listen 80;
    server_name aigate.uz www.aigate.uz hammabop.uz www.hammabop.uz;
    return 301 https://$host$request_uri;
}

# ─── HTTPS asosiy server ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name aigate.uz www.aigate.uz hammabop.uz www.hammabop.uz;

    # SSL (Certbot tomonidan to'ldiriladi)
    ssl_certificate     /etc/letsencrypt/live/aigate.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigate.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Yomon botlarni bloklash
    if ($is_bad_bot) {
        return 403;
    }

    # Bir IP'dan max ulanish soni
    limit_conn conn_limit 20;

    # ── /api/ — umumiy rate limit ─────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── /api/upload — qattiqroq limit ────────────────────────────
    location /api/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 52m;  # 50MB + overhead

        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── /api/nasiya-callback — faqat Alif/Uzum IP'laridan ────────
    location /api/nasiya-callback {
        # Alif va Uzum serverlarining haqiqiy IP'larini qo'shing
        # allow 185.8.212.0/24;  # Alif Nasiya
        # allow 91.212.157.0/24; # Uzum Nasiya
        # deny all;

        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── /uploads/ — statik media ──────────────────────────────────
    location /uploads/ {
        alias /var/www/hammabop/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;

        # Faqat rasm va video kengaytmalar
        location ~* \.(jpg|jpeg|png|webp|gif|mp4|webm)$ {
            expires 30d;
        }
        # Boshqa fayllarni bloklash
        location ~* \.(php|sh|py|exe|bat)$ {
            return 403;
        }
    }

    # ── /track — SPA sahifasi ─────────────────────────────────────
    location /track {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Asosiy frontend ───────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Gzip
        gzip            on;
        gzip_types      text/plain application/json application/javascript text/css;
        gzip_min_length 1000;
    }

    # ── 429 xatosi uchun custom javob ────────────────────────────
    error_page 429 @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"Juda ko'\''p so'\''rov. 1 daqiqadan so'\''ng qaytadan urinib ko'\''ring."}';
    }

    # ── Zararli URL'larni bloklash ────────────────────────────────
    location ~* (\.env|\.git|wp-admin|phpmyadmin|\.sql|xmlrpc\.php) {
        return 403;
    }

    # ── Access log ────────────────────────────────────────────────
    access_log /var/log/nginx/hammabop_access.log;
    error_log  /var/log/nginx/hammabop_error.log warn;
}
